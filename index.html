  </head>
  <body>
    <div id="root"></div>
    <script>
      document.addEventListener('copy', function (event) {
        const owners = Array.from(document.querySelectorAll('.owner-watermark'));
        const selection = window.getSelection ? window.getSelection() : null;
        if (!owners.length || !selection || selection.rangeCount === 0) return;

        let touchesOwner = false;
        const temp = document.createElement('div');

        for (let i = 0; i < selection.rangeCount; i++) {
          const range = selection.getRangeAt(i);
          if (owners.some(owner => {
            try { return range.intersectsNode(owner); }
            catch (_) { return false; }
          })) {
            touchesOwner = true;
          }
          temp.appendChild(range.cloneContents());
        }

        if (!touchesOwner) return;

        temp.querySelectorAll('.owner-watermark').forEach(node => node.remove());
        const remainingText = (temp.innerText || temp.textContent || '').replace(/ /g, '');
        const hasOtherCopiedText = remainingText.trim().length > 0;

        event.clipboardData.setData('text/plain', hasOtherCopiedText ? remainingText : '©');
        event.preventDefault();
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
