<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeExtractor Pro</title>
  </head>
  <body>
    <div id="root"></div>
    <span class="owner-watermark" aria-hidden="true">John Doe</span>
    <script>
      document.addEventListener('copy', function (event) {
        const owner = document.querySelector('.owner-watermark');
        const selection = window.getSelection ? window.getSelection() : null;
        if (!owner || !selection || selection.rangeCount === 0) return;

        let touchesOwner = false;
        const temp = document.createElement('div');

        for (let i = 0; i < selection.rangeCount; i++) {
          const range = selection.getRangeAt(i);
          if (range.intersectsNode(owner)) touchesOwner = true;
          temp.appendChild(range.cloneContents());
        }

        if (!touchesOwner) return;

        temp.querySelectorAll('.owner-watermark').forEach(node => node.remove());
        const copiedText = (temp.innerText || temp.textContent || '').replace(/John Doe/g, '');
        event.clipboardData.setData('text/plain', copiedText);
        event.preventDefault();
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
