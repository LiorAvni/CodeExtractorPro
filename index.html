    <meta charset="UTF-8" />

    <meta name="description" content="Turn code project ZIPs into clean text." />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta property="og:title" content="CodeExtractor Pro" />
    <meta property="og:description" content="Turn code project ZIPs into clean text." />
    <meta property="og:site_name" content="CodeExtractor Pro" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://code-extractor-pro.vercel.app/" />
    <meta property="og:image" content="https://code-extractor-pro.vercel.app/preview.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CodeExtractor Pro" />
    <meta name="twitter:description" content="Turn code project ZIPs into clean text." />
    <meta name="twitter:image" content="https://code-extractor-pro.vercel.app/preview.png" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      document.addEventListener('copy', function (event) {
        const owners = Array.from(document.querySelectorAll('.owner-watermark'));
        const selection = window.getSelection ? window.getSelection() : null;
        if (!owners.length || !selection || selection.rangeCount === 0) return;

        const marker = '\uE000';
        const originals = owners.map(owner => owner.textContent || '');

        try {
          owners.forEach((owner, index) => {
            owner.textContent = marker.repeat(originals[index].length || 1);
          });

          const markedText = String(selection.toString() || '').replace(/\u00a0/g, ' ');
          if (!markedText.includes(marker)) return;

          const withoutOwnerText = markedText.replace(new RegExp(marker, 'g'), '');

          if (withoutOwnerText.trim().length > 0) {
            event.clipboardData.setData('text/plain', withoutOwnerText);
          } else {
            event.clipboardData.setData('text/plain', '©');
          }
          event.preventDefault();
        } finally {
          owners.forEach((owner, index) => {
            owner.textContent = originals[index];
          });
        }
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
